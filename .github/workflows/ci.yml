name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test -race -count=1 -coverprofile=coverage.out ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: docker compose -f docker-compose.test.yml -p notifier-test up --exit-code-from tests
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml -p notifier-test down -v

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e tests
        run: docker compose -f docker-compose.e2e.yml -p notifier-e2e up --build --exit-code-from tests
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml -p notifier-e2e down -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit, integration, e2e]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t github-release-notifier .