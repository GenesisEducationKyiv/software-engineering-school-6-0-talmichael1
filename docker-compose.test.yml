services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_db"]
      interval: 2s
      timeout: 2s
      retries: 20

  tests:
    image: golang:1.25
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /src
    volumes:
      - .:/src
      - go-modcache:/go/pkg/mod
      - go-buildcache:/root/.cache/go-build
    environment:
      DATABASE_URL: postgres://test:test@postgres:5432/test_db?sslmode=disable
    command:
      - go
      - test
      - -race
      - -count=1
      - -p=1
      - -tags=integration
      - ./...

volumes:
  go-modcache:
  go-buildcache: