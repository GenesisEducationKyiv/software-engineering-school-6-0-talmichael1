version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell

  settings:
    errcheck:
      check-blank: false
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment

  exclusions:
    paths:
      - internal/grpc/proto
    rules:
      - path: _test\.go
        linters:
          - errcheck
